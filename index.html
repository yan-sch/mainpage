<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Startseite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header id="header">
    <div id="datetime">
      <span id="time-display"></span>
      <span id="date-display"></span>
    </div>
    <div id="greeting">Hi Yannick</div>
    <div id="search-wrapper">
      <select id="search-engine-select" title="Suchmaschine wählen">
        <option value="google">Google</option>
        <option value="duckduckgo">DuckDuckGo</option>
        <option value="kagi">Kagi</option>
      </select>
      <input type="text" id="search-input" placeholder="Suchen…" autocomplete="off" spellcheck="false" />
    </div>
  </header>

  <main id="grid">

    <!-- Linke Spalte: Wetter + Pomodoro gestapelt -->
    <div id="left-col">
      <section id="weather" class="card">
        <div id="weather-content">
          <div class="skeleton-block" style="height:44px;margin-bottom:6px"></div>
          <div class="skeleton-block" style="height:12px;width:60%"></div>
        </div>
      </section>

      <section id="timer" class="card">
        <div id="timer-top-row">
          <span id="timer-phase-label">Arbeit</span>
          <span id="timer-today">Heute: <span id="timer-count">0</span> 🍅</span>
        </div>
        <div id="timer-display">25:00</div>
        <div id="timer-bottom-row">
          <div id="timer-dots">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
          <div id="timer-buttons">
            <button id="timer-start">▶</button>
            <button id="timer-pause" disabled>⏸</button>
            <button id="timer-reset">↺</button>
          </div>
        </div>
      </section>
    </div>

    <section id="news-1" class="card news-widget">
      <header class="news-header">
        <select class="news-topic-select" data-widget="1">
          <option value="general">News allgemein</option>
          <option value="economy">Wirtschaft</option>
          <option value="ai">AI</option>
          <option value="gaming">Gaming</option>
        </select>
      </header>
      <ul class="news-list" id="news-list-1"></ul>
    </section>

    <section id="news-2" class="card news-widget">
      <header class="news-header">
        <select class="news-topic-select" data-widget="2">
          <option value="general">News allgemein</option>
          <option value="economy">Wirtschaft</option>
          <option value="ai">AI</option>
          <option value="gaming">Gaming</option>
        </select>
      </header>
      <ul class="news-list" id="news-list-2"></ul>
    </section>

    <section id="favorites">
      <div id="favorites-bar"></div>
      <button id="fav-edit-btn" title="Favoriten bearbeiten">⚙</button>
    </section>

    <section id="quiz" class="card">
      <div id="quiz-header">
        <div id="quiz-stats-row">
          <span id="quiz-streak" title="Tages-Streak">🔥 0</span>
          <span id="quiz-combo"></span>
          <span id="quiz-level-display">Lv.1 Beginner</span>
          <span id="quiz-xp-display">0 XP</span>
          <button id="quiz-stats-btn" title="Statistiken anzeigen">📊</button>
        </div>
        <div id="quiz-xp-bar-wrap"><div id="quiz-xp-bar"></div></div>
        <div id="quiz-filters">
          <div id="quiz-filter-kat">
            <button class="filter-btn active" data-kat="Alle">Alle</button>
            <button class="filter-btn" data-kat="Webentwicklung">Web</button>
            <button class="filter-btn" data-kat="Backend">Backend</button>
            <button class="filter-btn" data-kat="Code">Code</button>
            <button class="filter-btn" data-kat="Coding Glossar">Glossar</button>
            <button class="filter-btn" data-kat="Datenbanken">DB</button>
            <button class="filter-btn" data-kat="KI">KI</button>
            <button class="filter-btn" data-kat="Softwareentwicklung">Software</button>
          </div>
          <div id="quiz-filter-lvl">
            <button class="filter-btn active" data-lvl="Alle">Alle</button>
            <button class="filter-btn" data-lvl="1">★☆☆</button>
            <button class="filter-btn" data-lvl="2">★★☆</button>
            <button class="filter-btn" data-lvl="3">★★★</button>
          </div>
        </div>
      </div>
      <div id="quiz-body">
        <p id="quiz-question">Wird geladen…</p>
        <div id="quiz-answers"></div>
        <p id="quiz-explanation" class="hidden"></p>
        <div id="quiz-xp-float" class="hidden"></div>
      </div>
      <div id="quiz-stats-panel" class="hidden"></div>
      <canvas id="confetti-canvas"></canvas>
    </section>

    <section id="bookmarks" class="card">
      <div class="widget-section-title">
        <span>Leseliste</span>
        <button class="btn-ghost" id="bookmarks-toggle-read">Alle anzeigen</button>
      </div>
      <div id="bookmark-input-row">
        <input type="url" id="bookmark-url" placeholder="URL…" />
        <button id="bookmark-add">+</button>
      </div>
      <ul id="bookmarks-list"></ul>
    </section>

  </main>

  <!-- Favoriten-Modal -->
  <div id="fav-modal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Favoriten bearbeiten</h3>
        <button id="fav-modal-close">✕</button>
      </div>
      <ul id="fav-edit-list"></ul>
      <div id="fav-add-form">
        <input type="text" id="fav-new-label" placeholder="Name" />
        <input type="url" id="fav-new-url" placeholder="https://…" />
        <button id="fav-new-add">Hinzufügen</button>
      </div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
